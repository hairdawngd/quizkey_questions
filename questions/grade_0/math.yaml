questions:
- question: Có 2 quả táo, thêm 1 quả táo. Có tất cả mấy quả?
  answer: '3'
  choices:
  - '2'
  - '3'
  - '4'
  - '5'
  hint: Đếm 1, 2 rồi thêm 1.
- question: Số nào đứng sau số 4?
  answer: '5'
  choices:
  - '3'
  - '4'
  - '5'
  - '6'
  hint: 'Đếm: 1, 2, 3, 4, 5.'
- question: Hình nào có 3 cạnh?
  answer: Hình tam giác
  choices:
  - Hình tròn
  - Hình vuông
  - Hình tam giác
  - Hình chữ nhật
  hint: Tam giác có 3 cạnh.
- question: 1 + 1 = ?
  answer: '2'
  choices:
  - '1'
  - '2'
  - '3'
  - '4'
  hint: Một thêm một.
- question: 'Số nào lớn hơn: 3 hay 5?'
  answer: '5'
  choices:
  - '2'
  - '3'
  - '4'
  - '5'
  hint: Số 5 đứng sau số 3.
- question: Có 4 cái kẹo, ăn 1 cái. Còn mấy cái?
  answer: '3'
  choices:
  - '1'
  - '2'
  - '3'
  - '4'
  hint: Bớt đi 1 từ 4.
- question: Hình tròn giống đồ vật nào?
  answer: Quả bóng
  choices:
  - Quả bóng
  - Quyển sách
  - Cây thước
  - Cánh cửa
  hint: Quả bóng thường có dạng tròn.
- question: 'Đếm: 1, 2, 3, số tiếp theo là?'
  answer: '4'
  choices:
  - '3'
  - '4'
  - '5'
  - '6'
  hint: Sau 3 là 4.
- question: Có mấy ngón tay trên một bàn tay?
  answer: '5'
  choices:
  - '3'
  - '4'
  - '5'
  - '6'
  hint: Xòe một bàn tay ra đếm.
- question: Số 0 nghĩa là gì?
  answer: Không có
  choices:
  - Một cái
  - Hai cái
  - Không có
  - Rất nhiều
  hint: 0 là không có gì.
