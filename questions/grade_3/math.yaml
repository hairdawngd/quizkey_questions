  choices:
  - Có thể lấy được bóng xanh.
  - Chắc chắn lấy được bóng đỏ.
  - Chắc chắn lấy được bóng xanh.
  - Không thể lấy được bóng đỏ.
  hint: Vì trong hộp chỉ có toàn bóng đỏ nên không thể xảy ra trường hợp lấy được màu khác.
- question: Số liền trước của số 50 000 là số nào?
  answer: 49 999
