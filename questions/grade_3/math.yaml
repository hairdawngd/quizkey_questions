questions:
- question: Số 'Hai mươi tư nghìn không trăm mười lăm' được viết là gì?
  answer: 24 015
  choices:
  - 24 015
  - 24 150
  - 20 415
  - 24 005
  hint: Chú ý chữ số hàng nghìn là 24, hàng trăm là 0, hàng chục là 1, hàng đơn vị là 5.
- question: Số VII trong chữ số La Mã đọc là gì?
  answer: Bảy
  choices:
  - Năm
  - Sáu
  - Bảy
  - Tám
  hint: V là 5, I là 1. VII là 5 + 1 + 1.
- question: Kết quả của phép nhân 12 × 4 là bao nhiêu?
  answer: 48
  choices:
  - 42
  - 46
  - 48
  - 50
  hint: Nhẩm 10 × 4 = 40 và 2 × 4 = 8, rồi cộng lại.
- question: "Kết quả của phép chia 45 : 5 là bao nhiêu?"
  answer: 9
  choices:
  - 7
  - 8
  - 9
  - 10
  hint: Nhẩm bảng nhân 5, 5 nhân mấy bằng 45?
- question: Làm tròn số 435 đến hàng chục ta được số nào?
  answer: 440
  choices:
  - 430
  - 435
  - 440
  - 450
  hint: Chữ số hàng đơn vị là 5 (từ 5 trở lên), nên ta làm tròn lên.
- question: Chu vi của hình chữ nhật có chiều dài 8 cm, chiều rộng 5 cm là bao nhiêu?
  answer: 26 cm
  choices:
  - 13 cm
  - 26 cm
  - 40 cm
  - 30 cm
  hint: Công thức tính chu vi hình chữ nhật là (chiều dài + chiều rộng) × 2.
- question: Diện tích của hình vuông có cạnh 6 cm là bao nhiêu?
  answer: 36 cm2
  choices:
  - 12 cm2
  - 24 cm2
  - 36 cm2
  - 40 cm2
  hint: Công thức tính diện tích hình vuông là cạnh nhân cạnh.
- question: 1 kg bằng bao nhiêu gam?
  answer: 1000 g
  choices:
  - 10 g
  - 100 g
  - 1000 g
  - 10000 g
  hint: Ki-lô-gam là đơn vị lớn hơn gam 1000 lần.
- question: Mẹ rót đều 1 lít sữa vào 4 cốc. Mỗi cốc có bao nhiêu mi-li-lít sữa?
  answer: 250 ml
  choices:
  - 100 ml
  - 200 ml
  - 250 ml
  - 500 ml
  hint: Đổi 1 lít = 1000 ml, sau đó lấy 1000 chia cho 4.
- question: Giá trị của biểu thức 15 + 5 × 3 là bao nhiêu?
  answer: 30
  choices:
  - 30
  - 60
  - 20
  - 45
  hint: Trong biểu thức có phép cộng và phép nhân, ta phải thực hiện phép nhân trước.
- question: Số nào lớn nhất trong các số sau đây?
  answer: 89 100
  choices:
  - 89 010
  - 88 999
  - 89 100
  - 89 099
  hint: So sánh từng chữ số từ trái sang phải, so sánh đến hàng trăm để tìm số lớn nhất.
- question: "Tìm x biết x : 4 = 12"
  answer: 48
  choices:
  - 3
  - 8
  - 16
  - 48
  hint: Muốn tìm số bị chia, ta lấy thương nhân với số chia.
- question: Đồng hồ chỉ 3 giờ 15 phút, kim dài (kim phút) chỉ vào số mấy?
  answer: Số 3
  choices:
  - Số 1
  - Số 2
  - Số 3
  - Số 4
  hint: Mỗi khoảng giữa 2 số trên đồng hồ tương ứng với 5 phút. Lấy 15 chia 5.
- question: Một lớp học có 4 hàng ghế, mỗi hàng có 8 học sinh. Lớp đó có tất cả bao nhiêu học sinh?
  answer: 32 học sinh
  choices:
  - 12 học sinh
  - 24 học sinh
  - 32 học sinh
  - 40 học sinh
  hint: Dùng phép nhân để tính tổng số học sinh.
- question: Có 37 bông hoa cắm vào các lọ, mỗi lọ 5 bông. Hỏi cắm được nhiều nhất bao nhiêu lọ và còn thừa mấy bông?
  answer: 7 lọ, thừa 2 bông
  choices:
  - 6 lọ, thừa 7 bông
  - 7 lọ, thừa 2 bông
  - 8 lọ, thừa 0 bông
  - 7 lọ, thừa 1 bông
  hint: "Thực hiện phép chia 37 : 5 để tìm thương và số dư."
- question: Hình có 4 góc vuông và 4 cạnh bằng nhau là hình gì?
  answer: Hình vuông
  choices:
  - Hình chữ nhật
  - Hình thoi
  - Hình vuông
  - Hình bình hành
  hint: Đây là đặc điểm của một hình học cơ bản đã học.
- question: Điểm O là trung điểm của đoạn thẳng AB dài 10 cm. Độ dài đoạn thẳng OA là bao nhiêu?
  answer: 5 cm
  choices:
  - 2 cm
  - 5 cm
  - 10 cm
  - 20 cm
  hint: Trung điểm chia đoạn thẳng thành hai phần bằng nhau.
- question: 1/3 của 27 quả cam là bao nhiêu quả?
  answer: 9 quả
  choices:
  - 7 quả
  - 8 quả
  - 9 quả
  - 10 quả
  hint: Muốn tìm một phần ba của 27, ta lấy 27 chia cho 3.
- question: Số gồm 3 chục nghìn, 5 trăm, 2 đơn vị được viết là gì?
  answer: 30 502
