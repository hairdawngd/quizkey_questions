  - 28 ngày
  - 29 ngày
  - 30 ngày
  - 31 ngày
  hint: Tháng 2 có ít ngày nhất trong năm, năm nhuận mới có 29 ngày.
- question: 2 m 5 cm = ... cm. Số thích hợp điền vào chỗ chấm là?
  answer: 205
