  - 45 cm
  - 50 cm
  hint: Chu vi tam giác bằng tổng độ dài 3 cạnh cộng lại.
- question: Lan mua 2 quyển vở, mỗi quyển giá 8 000 đồng và 1 cây bút giá 5 000 đồng. Lan phải trả cô bán hàng bao nhiêu tiền?
  answer: 21 000 đồng
  choices:
  - 13 000 đồng
  - 21 000 đồng
  - 26 000 đồng
  - 16 000 đồng
  hint: Tính tiền mua 2 quyển vở trước (2 x 8.000), sau đó cộng với tiền mua bút.
- question: Số XIX trong số La Mã có giá trị là bao nhiêu?
  answer: 19
  choices:
  - 11
  - 15
  - 19
  - 21
  hint: X là 10, IX là 9. XIX là 10 + 9.
- question: Nhiệt độ cơ thể người bình thường khỏe mạnh là khoảng bao nhiêu độ C?
  answer: 37 độ C
  choices:
  - 20 độ C
  - 30 độ C
  - 37 độ C
  - 100 độ C
  hint: Đây là một kiến thức thực tế về đo nhiệt độ cơ thể người.
- question: Phép chia nào sau đây có số dư lớn nhất khi chia cho 5?
