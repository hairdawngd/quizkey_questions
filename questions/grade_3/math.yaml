  - "17 : 5"
  - "18 : 5"
  - "19 : 5"
  hint: Số dư lớn nhất trong phép chia cho 5 là 4.
- question: Làm tròn số 6 524 đến hàng nghìn ta được số nào?
  answer: 7 000
