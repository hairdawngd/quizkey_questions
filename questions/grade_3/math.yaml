  - 6 000
  - 6 500
  - 7 000
  - 6 600
  hint: Chữ số hàng trăm là 5 (từ 5 trở lên), nên ta làm tròn lên ở hàng nghìn.
- question: Trong một hình tròn, đường kính dài gấp mấy lần bán kính?
