  - 24 học sinh
  - 32 học sinh
  hint: "Đây là bài toán rút về đơn vị. Tính số học sinh 1 hàng (48 : 6), rồi nhân với 3."
- question: Phân số 1/4 của 100 kg là bao nhiêu?
  answer: 25 kg
