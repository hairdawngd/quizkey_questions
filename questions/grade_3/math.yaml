  - 35 200
  - 30 520
  - 30 502
  - 35 002
  hint: Các hàng không được nhắc đến (hàng nghìn, hàng chục) sẽ có giá trị bằng chữ số 0.
- question: Tờ tiền nào có giá trị lớn nhất trong các tờ tiền sau?
  answer: 100 000 đồng
  choices:
  - 10 000 đồng
  - 20 000 đồng
  - 50 000 đồng
  - 100 000 đồng
  hint: So sánh các con số được ghi trên mệnh giá tiền.
- question: Tháng 2 của một năm không nhuận có bao nhiêu ngày?
