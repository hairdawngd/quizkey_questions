  hint: Đường kính là đoạn thẳng đi qua tâm và nối hai điểm trên đường tròn, nó bằng hai lần bán kính.
- question: Giá trị của biểu thức 45 - (15 + 5) là bao nhiêu?
  answer: 25
  choices:
  - 35
  - 25
  - 20
  - 30
  hint: Biểu thức có dấu ngoặc, ta phải tính trong ngoặc trước.
- question: 1 cm bằng bao nhiêu mi-li-mét (mm)?
  answer: 10 mm
  choices:
  - 10 mm
  - 100 mm
  - 1000 mm
  - 5 mm
  hint: Mi-li-mét là đơn vị đo độ dài nhỏ hơn xăng-ti-mét 10 lần.
- question: Trong một chiếc hộp có 5 quả bóng màu đỏ, không có quả bóng màu xanh. Lấy ngẫu nhiên 1 quả bóng. Khả năng nào sau đây là đúng?
