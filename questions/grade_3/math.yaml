  - 250
  - 2005
  hint: Đổi 2 m = 200 cm, sau đó cộng thêm 5 cm.
- question: "Tìm x biết 56 : x = 8"
  answer: 7
  choices:
  - 6
  - 7
  - 8
  - 9
  hint: Muốn tìm số chia, ta lấy số bị chia chia cho thương.
- question: Một hình tam giác có độ dài các cạnh lần lượt là 12 cm, 15 cm, 18 cm. Chu vi hình tam giác đó là?
