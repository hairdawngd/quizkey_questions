  - 80
  - 800
  - 8000
  hint: Chữ số 8 nằm ở hàng nghìn nên có giá trị là 8 nghìn.
- question: Bạn Hoa có 3 tờ tiền mệnh giá 10 000 đồng và 1 tờ 5 000 đồng. Tổng số tiền Hoa có là bao nhiêu?
  answer: 35 000 đồng
  choices:
  - 15 000 đồng
  - 25 000 đồng
  - 35 000 đồng
  - 45 000 đồng
